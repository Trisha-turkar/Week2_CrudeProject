<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:rgba(17,24,39,.95);
    padding:20px;
    position:fixed;
}

.sidebar h3{
    color:#38bdf8;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#cbd5e1;
    padding:12px;
    margin:10px 0;
}

/* MAIN */
.main{
    margin-left:240px;
    width:100%;
    padding:25px;
}

/* CARDS */
.header{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.card{
    flex:1;
    padding:22px;
    border-radius:16px;
    background:#1e293b;
}

/* LAYOUT */
.container{
    display:grid;
    grid-template-columns:1fr 1.5fr;
    gap:25px;
}

/* BOX */
.form-box,.table-box{
    background:#1e293b;
    padding:25px;
    border-radius:16px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}
#search{
width:100%;
padding:12px;
margin:15px 0;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
font-size:15px;
}
#search{
margin:15px 0;
}
 #sort{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
}

th{
    color:#38bdf8;
    border-bottom:2px solid #38bdf8;
}

/* FOOTER BUTTONS */
.footer{
    position:fixed;
    bottom:0;
    left:240px;
    right:0;
    background:#111827;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.footer button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    color:white;
}

.add{background:#22c55e;}
.update{background:#3b82f6;}
.delete{background:#ef4444;}
.clear{background:#f59e0b;}

body {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.sidebar {
    animation: slideLeft 0.6s ease-out;
}

@keyframes slideLeft {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
.card {
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
}
tbody tr {
    transition: all 0.25s ease;
}

tbody tr:hover {
    background: rgba(56, 189, 248, 0.08);
    transform: scale(1.01);
}
.footer button {
    transition: all 0.2s ease;
}

.footer button:active {
    transform: scale(0.92);
}
input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    transform: scale(1.02);
    transition: 0.2s ease;
}
tbody tr {
    animation: rowFade 0.4s ease-in-out;
}

@keyframes rowFade {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


.sidebar a {
    position: relative;
    transition: all 0.3s ease;
    overflow: hidden;
}
.sidebar a::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38bdf8, transparent);
    transition: width 0.3s ease;
    z-index: 0;
}
.sidebar a:hover::before {
    width: 100%;
}

.sidebar a:hover {
    color: white;
    transform: translateX(8px);
}

.sidebar h2 {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 5px #38bdf8;
    }
    to {
        text-shadow: 0 0 20px #38bdf8;
    }
}

.footer button {
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    transform: translateY(0);
}
.footer button:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(56, 189, 248, 0.25);
    filter: brightness(1.1);
}
.footer button:active {
    transform: scale(0.92);
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}
.footer button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
    );
    transition: 0.5s;
}
.footer button:hover::before {
    left: 100%;
}
.add:hover {
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
}

.update:hover {
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
}

.delete:hover {
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
}

.clear:hover {
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
}
.footer button {
    animation: btnFade 0.6s ease-in-out;
}

@keyframes btnFade {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Employeemanagement</h3>
<a href="#">Dashboard</a>
<a href="#">Employees</a>
<a href="#">Add Employee</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="card">
<h3>Total Employees</h3>
<h1 id="totalEmployees">0</h1>
</div>

<div class="card">
<h3>Total Salary</h3>
<h1 id="totalSalary">₹0</h1>
</div>
</div>

<div class="container">

<!-- FORM -->
<div class="form-box">
<h2>Employee Form</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="department" placeholder="Department">
<input id="salary" placeholder="Salary">

</div>

<!-- TABLE -->
<div class="table-box">
<h2>Employee Table</h2>

<input
type="text"
id="search"
placeholder="🔍 Search by Name or Department"
onkeyup="searchEmployee()">
<select id="sort" onchange="sortEmployees()">
    <option value="">Sort By</option>
    <option value="nameAsc">Name (A-Z)</option>
    <option value="nameDesc">Name (Z-A)</option>
    <option value="salaryLow">Salary (Low to High)</option>
    <option value="salaryHigh">Salary (High to Low)</option>
</select>





<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Dept</th>
<th>Salary</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>
</table>



</div>



</div>
</div>

<!-- ✅ FOOTER BUTTONS -->
 <div class="footer">

<button class="add" onclick="addEmployee()">Add</button>
<button class="update" onclick="updateEmployee()">Update</button>
<button class="delete" onclick="deleteEmployeeById()">Delete</button>
<button class="clear" onclick="clearForm()">Clear</button>

</div> 

<script>

let editingId = null;

/* LOAD EMPLOYEES */

function loadEmployees(){

fetch("http://localhost:3000/employees")
.then(res=>res.json())
.then(data=>{

let rows="";
let totalSalary=0;

data.forEach(emp=>{

totalSalary += Number(emp.salary);

rows += `
<tr onclick="fillForm(${emp.id},'${emp.name}','${emp.email}','${emp.department}',${emp.salary})" style="cursor:pointer;">
<td>${emp.id}</td>
<td>${emp.name}</td>
<td>${emp.email}</td>
<td>${emp.department}</td>
<td>₹${emp.salary}</td>
</tr>
`;

});

document.getElementById("employeeTable").innerHTML=rows;
document.getElementById("totalEmployees").innerText=data.length;
document.getElementById("totalSalary").innerText="₹"+totalSalary;

});

}


/*  FILL FORM  */

function fillForm(id,name,email,department,salary){

editingId=id;

document.getElementById("name").value=name;
document.getElementById("email").value=email;
document.getElementById("department").value=department;
document.getElementById("salary").value=salary;

}


/* ADD  */

function addEmployee(){

const employee={

name:document.getElementById("name").value.trim(),
email:document.getElementById("email").value.trim(),
department:document.getElementById("department").value.trim(),
salary: Number(document.getElementById("salary").value.trim())
};

if(!employee.name || !employee.email || !employee.department || !employee.salary){

alert("Please fill all fields");
return;

}
const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(employee.email)){
    alert("Please enter a valid email address.");
    return;
}


fetch("http://localhost:3000/employees",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(employee)

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

clearForm();

loadEmployees();

});

}


/* UPDATE */

function updateEmployee(){

if(editingId===null){

alert("Please select an employee from the table.");

return;

}

const employee={

name:document.getElementById("name").value.trim(),
email:document.getElementById("email").value.trim(),
department:document.getElementById("department").value.trim(),
salary:document.getElementById("salary").value.trim()

};

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(employee.email)){
    alert("Please enter a valid email address.");
    return;
}

if(employee.salary <= 0){
    alert("Salary must be greater than 0.");
    return;
}


fetch(`http://localhost:3000/employees/${editingId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(employee)

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

clearForm();

loadEmployees();

});

}


/*  DELETE  */

function deleteEmployeeById(){

if(editingId===null){

alert("Please select an employee from the table.");

return;

}

if(!confirm("Are you sure you want to delete this employee?")){

return;

}

fetch(`http://localhost:3000/employees/${editingId}`,{

method:"DELETE"

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

clearForm();

loadEmployees();

});

}


/* CLEAR  */

function clearForm(){

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("department").value="";
document.getElementById("salary").value="";

editingId=null;

}


/* PAGE LOAD */

loadEmployees();
function searchEmployee(){

let key=document.getElementById("search").value;

if(key===""){
loadEmployees();
return;
}

fetch(`http://localhost:3000/employees/search/${key}`)
.then(res=>res.json())
.then(data=>{

let rows="";
let totalSalary=0;

data.forEach(emp=>{

totalSalary += Number(emp.salary);

rows += `
<tr onclick="fillForm(${emp.id},'${emp.name}','${emp.email}','${emp.department}',${emp.salary})">
<td>${emp.id}</td>
<td>${emp.name}</td>
<td>${emp.email}</td>
<td>${emp.department}</td>
<td>₹${emp.salary}</td>
</tr>
`;

});

document.getElementById("employeeTable").innerHTML=rows;
document.getElementById("totalEmployees").innerText=data.length;
document.getElementById("totalSalary").innerText="₹"+totalSalary;

});

}
function sortEmployees(){

let option = document.getElementById("sort").value;

fetch("http://localhost:3000/employees")
.then(res => res.json())
.then(data => {

if(option == "nameAsc"){
    data.sort((a,b) => a.name.localeCompare(b.name));
}

else if(option == "nameDesc"){
    data.sort((a,b) => b.name.localeCompare(a.name));
}

else if(option == "salaryLow"){
    data.sort((a,b) => Number(a.salary) - Number(b.salary));
}

else if(option == "salaryHigh"){
    data.sort((a,b) => Number(b.salary) - Number(a.salary));
}

let rows = "";
let totalSalary = 0;

data.forEach(emp => {

totalSalary += Number(emp.salary);

rows += `
<tr onclick="fillForm(${emp.id},'${emp.name}','${emp.email}','${emp.department}',${emp.salary})" style="cursor:pointer;">
<td>${emp.id}</td>
<td>${emp.name}</td>
<td>${emp.email}</td>
<td>${emp.department}</td>
<td>₹${emp.salary}</td>
</tr>
`;

});

document.getElementById("employeeTable").innerHTML = rows;
document.getElementById("totalEmployees").innerText = data.length;
document.getElementById("totalSalary").innerText = "₹" + totalSalary;

})
.catch(err => {
    console.log(err);
    alert("Unable to sort employees.");
});

}

</script>

</body>
</html>
